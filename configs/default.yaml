general:
  strict_mode: false

columns:

  user_id:
    aliases: [id, userId, customer_id]
    fuzzy_match: true
    dtype: str
    required: false

  name:
    aliases: [full_name, username]
    dtype: str
    text_cleaning:
      strip: true
      title: true

  age:
    aliases: [years, age_in_years]
    dtype: int
    missing: median

  salary:
    aliases: [income, pay]
    dtype: float
    outliers:
      method: cap_percentile
      lower: 0.10
      upper: 0.90